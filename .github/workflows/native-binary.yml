name: "Westward Binary"

on:
  workflow_dispatch:

jobs:
  native-image:
    name: Build Native Image - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            filename: westward-linux
            extension: ""
          - os: windows-latest
            filename: westward-windows
            extension: ".exe"
          - os: macos-latest
            filename: westward-macos-a
            extension: ""
          - os: macos-15-intel
            filename: westward-macos-i
            extension: ""

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 'nightly'

      # Compile with JDK 25
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Compile Jar
        run: gradle build --no-daemon --stacktrace

      - name: Jar Output (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Contents of build/libs/:"
          ls -lh build/libs

      - name: Jar Output (Windows)
        if: runner.os == 'Windows'
        run: |
          echo Contents of build/libs/:
          dir build\libs
        shell: cmd

      - name: Get Project Version
        id: gradle_version
        shell: bash
        run: |
          version=$(gradle properties -q | grep '^version:' | awk '{print $2}')
          echo "Project version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Switch to GraalVM 25 for native-image
      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'graalvm'
          java-version: '25.0.1'
          cache: 'gradle'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version

      - name: Build Native (Windows)
        if: runner.os == 'Windows'
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}\.gradle
          JAVA_TOOL_OPTIONS: "-Djava.io.tmpdir=${{ github.workspace }}\\tmp"
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mkdir "%GITHUB_WORKSPACE%\tmp"
          mkdir -p native
          native-image --link-at-build-time -jar build/libs/westward.jar native/westward-${{ steps.gradle_version.outputs.version }}

      - name: Build Native (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p native
          native-image --link-at-build-time -jar build/libs/westward.jar native/westward-${{ steps.gradle_version.outputs.version }}

      - name: Rename binary
        shell: bash
        run: |
          VERSION="${{ steps.gradle_version.outputs.version }}"
          mkdir -p dist
          FILE=$(ls native/*westward-${VERSION}*)
          mv "$FILE" "dist/${{ matrix.filename }}-${VERSION}${{ matrix.extension }}"

      - name: Upload Native Binary
        uses: actions/upload-artifact@v7
        with:
          name: westward-${{ matrix.os }}
          path: dist/*